spring:
  application:
    name: preference-service
  datasource:
    url: jdbc:postgresql://localhost:5435/preferencedb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


server:
  port: 8084


management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus