services:
  event-service:
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-events:5432/eventdb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
      SPRING_DATA_REDIS_HOST: redis
    container_name: event-service
    build:
      context: .
      dockerfile: event-service/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      postgres-events:
        condition: service_healthy
      broker:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - event-ticket-network


  booking-service:
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-bookings:5432/bookingdb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
      EVENT_SERVICE_URL: http://event-service:8081
    container_name: booking-service
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      postgres-bookings:
        condition: service_healthy
      broker:
        condition: service_started
    networks:
      - event-ticket-network

  notification-service:
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notifications:5432/notificationdb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
      BOOKING_SERVICE_URL: http://booking-service:8082
      PREFERENCE_SERVICE_URL: http://preference-service:8084
    container_name: notification-service
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8083:8083"
    depends_on:
      postgres-notifications:
        condition: service_healthy
      broker:
        condition: service_started
    networks:
      - event-ticket-network


  preference-service:
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-preferences:5432/preferencedb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
    container_name: preference-service
    build:
      context: .
      dockerfile: preference-service/Dockerfile
    ports:
      - "8084:8084"
    depends_on:
      postgres-preferences:
        condition: service_healthy
      broker:
        condition: service_started
    networks:
      - event-ticket-network


  postgres-events:
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventdb
    image: postgres:16
    container_name: postgres-events
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-ticket-network


  postgres-bookings:
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookingdb
    image: postgres:16
    container_name: postgres-bookings
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-ticket-network


  postgres-notifications:
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notificationdb
    image: postgres:16
    container_name: postgres-notifications
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-ticket-network


  postgres-preferences:
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: preferencedb
    image: postgres:16
    container_name: postgres-preferences
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-ticket-network



  broker:
    image: apache/kafka:latest
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - event-ticket-network

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - event-ticket-network


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - event-ticket-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - event-ticket-network

networks:
  event-ticket-network:
    driver: bridge