global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'event-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'event-service:8081' ]

  - job_name: 'booking-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'booking-service:8082' ]

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'notification-service:8083' ]

  - job_name: 'preference-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'preference-service:8084' ]